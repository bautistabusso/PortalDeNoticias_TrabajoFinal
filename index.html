<!DOCTYPE html>
<html lang="es">

    <link rel="stylesheet" href="css/styles.css">

        <nav>

        </nav>

        <!-- Botón dark mode -->
        <button id="theme-toggle">🌙</button>

        <div id="dolar-container">

        <h2>Noticias</h2>

        <div id="news-container">
            <!-- JS va a renderizar las noticias -->

    <!-- FOOTER -->

        <p>© 2026 - Portal del Dólar</p>
    </footer>


    <!-- JS -->
    <script src="js/main.js"></script>
