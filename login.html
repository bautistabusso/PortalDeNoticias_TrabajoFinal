<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">

        <h1>🔐 Login Administrador</h1>

        <form id="login-form">

            <input
                type="text"
                id="username"
                placeholder="Usuario"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

        <p id="mensaje"></p>

    </div>

    <script src="js/auth.js"></script>

</body>
</html>
